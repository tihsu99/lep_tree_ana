  NeutrinoReconstructionProcessor:
    output_dir_name: "neutrino_reco"
    mmc_regions: ["ee", "mumu", "emu"]
    regions:
      - *RegionName
      - hadhad
      - ee
      - mumu
      - emu

  QIProcessor:
    output_dir_name: "QI_analysis"
    dict_region_to_signals:
      *RegionName: ["Ztautau_pipi", "Ztautau_ee", "Ztautau_emu", "Ztautau_mumu"]
      hadhad: ["Ztautau_pipi", "Ztautau_pirho", "Ztautau_rhorho"]
      ee: ["Ztautau_ee"]
      mumu: ["Ztautau_mumu"]
      emu: ["Ztautau_emu", "Ztautau_mue"]

  ControlPlotProcessor:
    output_dir_name: "control_plots"
    regions:
      - *RegionName
      - "hadhad"
      - "ee"
      - "mumu"
      - "emu"

