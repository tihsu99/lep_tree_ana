GlobalConfigs:
  default_output_dir: "./20260427-pirho"
  processed_data_dir: "./20260427-dataset/"
  load_regions:
    - "pipi"
    - "pirho"
    - "rhopi"

  verbosity: 0
  luminosity: &Luminosity 46.3 # pb^-1
  # Ztautau sample can be further split categorizes below
  signal_categories:
    Ztautau_pipi: [11]
    Ztautau_pirho: [12]
    Ztautau_rhopi: [21]
    Ztautau_rhorho: [22]
    # Ztautau_lephad: [13, 31, 14, 41, 23, 24, 42, 32]
  shift_SDM:
    - ["nominal", 0.0]
    # - ["C_rr", 0.25]
    # - ["C_rr", -0.25]
    # - ["C_nn", 0.25]
    # - ["C_rn", -0.25]
    # - ["B_Ak", 0.25]
    # - ["B_Bn", -0.25]

DataLoaders:
  data94:
    name: "data94"
    tree_name: "t"
    is_data: true
    is_signal: false
  
  Ztautau:
    name: "Ztautau"
    is_data: false
    is_signal: false
    norm_factor: 1458.9 # pb
      
  Zll:
    name: "Zll"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor:  2844.4 # pb

  Zqq:
    name: "Zqq"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor: 30511.2 # pb

Processors:
  NeutrinoReconstructionProcessor:
    output_dir_name: "neutrino_reco"
    mmc_regions: []
    regions:
      - pirho
      - rhopi
      - pipi

  QIProcessor:
    output_dir_name: "QI_analysis"
    dict_region_to_signals:
      pirho: ["Ztautau_pirho"]
      rhopi: ["Ztautau_rhopi"]
      pipi: ["Ztautau_pipi"]

  ControlPlotProcessor:
    output_dir_name: "control_plots"
    regions:
      - pirho
      - rhopi
      - pipi
