GlobalConfigs:
  default_output_dir: "./20260515-baseline/"
  # default_output_dir: "./20260512-closure-test/"
  processed_data_dir: "./20260515-dataset/"
  load_regions:
    - "baseline"
    - "pipi"
    - "pirho"
    - "rhopi"
    - "rhorho"
    - "ee"
    - "mumu"
    - "emu"
    - "pie"
    - "epi"
    - "pimu"
    - "mupi"
    - "rhoe"
    - "erho"
    - "rhomu"
    - "murho"
    - "zll"
    - "zee"
    - "zmumu"
  verbosity: 1
  luminosity: &Luminosity 46.3 # pb^-1
  # Ztautau sample can be further split categorizes below.
  # Lephad split: one category per (lepton, hadron) ordered combination so
  # QIProcessor can match each lephad region to exactly one event_category.
  signal_categories:
    Ztautau_pipi: [11]
    Ztautau_pirho: [12]
    Ztautau_rhopi: [21]
    Ztautau_rhorho: [22]
    Ztautau_pie:  [13]
    Ztautau_epi:  [31]
    Ztautau_pimu:  [14]
    Ztautau_mupi:  [41]
    Ztautau_rhoe: [23]
    Ztautau_erho: [32]
    Ztautau_rhomu: [24]
    Ztautau_murho: [42]
    Ztautau_ee: [33]
    Ztautau_mumu: [44]
    Ztautau_emu: [34]
    Ztautau_mue: [43]

DataLoaders:
  data94:
    name: "data94"
    tree_name: "t"
    is_data: true
    is_signal: false
  
  Ztautau:
    name: "Ztautau"
    is_data: false
    is_signal: false
    norm_factor: 1458.9 # pb
      
  Zll:
    name: "Zll"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor:  2844.4 # pb

  Zqq:
    name: "Zqq"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor: 30511.2 # pb

