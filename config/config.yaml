GlobalConfigs:
  default_output_dir: "./20260512-fit/"
  # default_output_dir: "./20260512-closure-test/"
  processed_data_dir: "./20260512-dataset/"
  load_regions:
    - "baseline"
    - "pipi"
    - "pirho"
    - "rhopi"
    - "ee"
    - "mumu"
    - "emu"
    - "pi_el"
    - "el_pi"
    - "pi_mu"
    - "mu_pi"
    - "rho_el"
    - "el_rho"
    - "rho_mu"
    - "mu_rho"
    - "zll"
    - "zee"
    - "zmumu"
  verbosity: 1
  luminosity: &Luminosity 46.3 # pb^-1
  # Ztautau sample can be further split categorizes below.
  # Lephad split: one category per (lepton, hadron) ordered combination so
  # QIProcessor can match each lephad region to exactly one event_category.
  signal_categories:
    Ztautau_pipi: [11]
    Ztautau_pirho: [12]
    Ztautau_rhopi: [21]
    Ztautau_rhorho: [22]
    Ztautau_pi_el:  [13]
    Ztautau_el_pi:  [31]
    Ztautau_pi_mu:  [14]
    Ztautau_mu_pi:  [41]
    Ztautau_rho_el: [23]
    Ztautau_el_rho: [32]
    Ztautau_rho_mu: [24]
    Ztautau_mu_rho: [42]
    Ztautau_ee: [33]
    Ztautau_mumu: [44]
    Ztautau_emu: [34]
    Ztautau_mue: [43]

DataLoaders:
  data94:
    name: "data94"
    tree_name: "t"
    is_data: true
    is_signal: false
  
  Ztautau:
    name: "Ztautau"
    is_data: false
    is_signal: false
    norm_factor: 1458.9 # pb
      
  Zll:
    name: "Zll"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor:  2844.4 # pb

  Zqq:
    name: "Zqq"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor: 30511.2 # pb

