  NeutrinoReconstructionProcessor:
    output_dir_name: "neutrino_reco"
    mmc_regions: ["ee", "mumu", "emu"]
    regions:
      - pipi
      - pirho
      - rhopi
      - ee
      - mumu
      - emu

  QIProcessor:
    output_dir_name: "QI_analysis"
    dict_region_to_signals:
      pipi: ["Ztautau_pipi"]
      pirho: ["Ztautau_pirho"]
      rhopi: ["Ztautau_rhopi"]
      ee: ["Ztautau_ee"]
      mumu: ["Ztautau_mumu"]
      emu: ["Ztautau_emu", "Ztautau_mue"]

  ControlPlotProcessor:
    output_dir_name: "control_plots"
    regions:
      - "pipi"
      - "pirho"
      - "rhopi"
      - "ee"
      - "mumu"
      - "emu"

