NeutrinoPrediction:
  Ztautau:
    - Ztautau_rhorho

Normalization:
  Sequential:
    Part_energy: log_normalize
    Part_pt: log_normalize
    Part_eta: normalize
    Part_phi: normalize_uniform
    Part_hpcShowerEnergy: normalize
    Part_hpcShowerTheta: normalize
    Part_hpcShowerPhi: normalize
    Part_hpcNumLayers: normalize
    Part_hpcNumAssociatedShowers: normalize
    Part_hpcTotalShowerEnergy: normalize
    Part_hacShowerEnergy: normalize
    Part_hacShowerTheta: normalize
    Part_hacShowerPhi: normalize
    Part_hacNumTowers: normalize
    Part_hacNumAssociatedShowers: normalize
    Part_hacTotalShowerEnergy: normalize
    Part_sticShowerEnergy: normalize
    Part_sticShowerTheta: normalize
    Part_sticShowerPhi: normalize
    Part_sticNumTowers: normalize
    Part_in_hemisphere_a: none
    Part_in_hemisphere_b: none
    Part_dR_to_lead_a: normalize
    Part_dR_to_lead_a: normalize
    Part_angle_to_lead_a: normalize
    Part_angle_to_lead_b: normalize
  Global:
#    Event_totalChargedEnergy: log_normalize
#    Event_totalEMEnergy: log_normalize
#    Event_totalHadronicEnergy: log_normalize
    thrust_Mag: normalize
#    charged_E: log_normalize
    missing_px: normalize
    missing_py: normalize
    missing_pz: normalize
    lead_a_px: normalize
    lead_a_py: normalize
    lead_a_pz: normalize
    lead_b_px: normalize
    lead_b_py: normalize
    lead_b_pz: normalize
    isolation_angle: normalize
    thrust_x: normalize
    thrust_y: normalize
    thrust_z: normalize
  Invisible:
#    pt: normalize
    eta: normalize
