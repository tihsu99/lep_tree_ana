    tree_name: "t"
    region_of_interest: "pipi"
    is_data: true
    is_signal: false
    input_files:
      - "/eos/home-y/yulei/Ztautau/ntuple/collision_data/v94c/91.25/nanoaod_*.al_ttree.root"
  
