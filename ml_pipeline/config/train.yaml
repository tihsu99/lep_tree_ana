platform:
  data_parquet_dir: /pscratch/sd/t/tihsu/database/ZtautauAnalysis/event-input
  number_of_workers: 1
  resources_per_worker: {
    "CPU": 1,
    "GPU": 1,
  }
  batch_size: 512
  prefetch_batches: 1
  use_gpu: true

logger:
  wandb:
    project: "EveNet"
    run_name: &logger_name "LEP-TauNu"
    tags: ["EveNet", "LEP"]
    entity: ytchou97-university-of-washington
    simplified: false
  local:
    save_dir: /tmp/tihsu/logs
    name: *logger_name
    version: "v1"

options:
  default: ../EveNet-Full/share/options/options.yaml

  Training:
    total_epochs: 100
    epochs: 100
    model_checkpoint_save_path: /pscratch/sd/t/tihsu/database/ZtautauAnalysis/event-input/checkpoint
    model_checkpoint_load_path: null
    pretrain_model_load_path: null
    diffusion_every_n_epochs: 4
    diffusion_every_n_steps: 1
    eval_metrics_every_n_epochs: 1
    apply_event_weight: false

    Components:
      Classification:
        include: true

      Regression:
        include: false

      Assignment:
        include: false

      Segmentation:
        include: false
        use_full_mask: true

      GlobalGeneration:
        include: false
        diffusion_steps: 2

      ReconGeneration:
        include: false
        diffusion_steps: 2

      TruthGeneration:
        include: true
        diffusion_steps: 2

    EarlyStopping:
      patience: 100
      min_delta: 0.0
      monitor: "val/loss"
      mode: "min"
      verbose: true

    FAMO:
      turn_on: false
      detailed_loss: false

    EMA:
      enable: true
      decay: 0.999
      start_epoch: 0
      update_every_n_steps: 1
      replace_model_after_load: true
      replace_model_at_end: false

  Dataset:
    dataset_limit: 0.1
    normalization_file: /pscratch/sd/t/tihsu/database/ZtautauAnalysis/event-input/normalization.pt
    val_split: [0.95, 1.0]

network:
  default: ../EveNet-Full/share/network/network-20M.yaml

  Body:
    PET:
      feature_drop: 0.0

  TruthGeneration:
    feature_drop: 0.0

event_info:
  default: generated_event_info.yaml

resonance:
  default: resonance.yaml
