  ForwardFoldingProcessor:
    output_dir_name: "ForwardFoldingProcessor"
    dict_region_to_signals:
      pipi: ["Ztautau_pipi", "Ztautau_pirho", "Ztautau_rhopi"]
      mumu: ["Ztautau_mumu"]
      pirho: ["Ztautau_pirho", "Ztautau_rhorho"]
      rhopi: ["Ztautau_rhopi", "Ztautau_rhorho"]

  QIProcessor:
    output_dir_name: "QI_analysis"
    dict_region_to_signals:
      pipi: ["Ztautau_pipi"]
      pirho: ["Ztautau_pirho"]
      rhopi: ["Ztautau_rhopi"]
      ee: ["Ztautau_ee"]
      mumu: ["Ztautau_mumu"]
      emu: ["Ztautau_emu", "Ztautau_mue"]
      pi_el:  ["Ztautau_pi_el"]
      el_pi:  ["Ztautau_el_pi"]
      pi_mu:  ["Ztautau_pi_mu"]
      mu_pi:  ["Ztautau_mu_pi"]
      rho_el: ["Ztautau_rho_el"]
      el_rho: ["Ztautau_el_rho"]
      rho_mu: ["Ztautau_rho_mu"]
      mu_rho: ["Ztautau_mu_rho"]

  ControlPlotProcessor:
    output_dir_name: "control_plots"
    regions:
      - "pipi"
      - "pirho"
      - "rhopi"
      - "ee"
      - "mumu"
      - "emu"
      - "pi_el"
      - "el_pi"
      - "pi_mu"
      - "mu_pi"
      - "rho_el"
      - "el_rho"
      - "rho_mu"
      - "mu_rho"
      - "zll"
      - "zee"
      - "zmumu"

