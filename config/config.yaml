GlobalConfigs:
  default_output_dir: "./20260427-baseline"
  processed_data_dir: "./20260427-dataset/"
  load_regions:
    - "baseline"
    - "pipi"
    - "pirho"
    - "rhopi"
    - "ee"
    - "mumu"
    - "emu"
  verbosity: 1
  luminosity: &Luminosity 46.3 # pb^-1
  # Ztautau sample can be further split categorizes below
  signal_categories:
    Ztautau_pipi: [11]
    Ztautau_pirho: [12]
    Ztautau_rhopi: [21]
    Ztautau_rhorho: [22]
    Ztautau_lephad: [13, 31, 14, 41, 23, 24, 42, 32]
    Ztautau_ee: [33]
    Ztautau_mumu: [44]
    Ztautau_emu: [34]
    Ztautau_mue: [43]

DataLoaders:
  data94:
    name: "data94"
    tree_name: "t"
    is_data: true
    is_signal: false
  
  Ztautau:
    name: "Ztautau"
    is_data: false
    is_signal: false
    norm_factor: 1458.9 # pb
      
  Zll:
    name: "Zll"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor:  2844.4 # pb

  Zqq:
    name: "Zqq"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor: 30511.2 # pb

