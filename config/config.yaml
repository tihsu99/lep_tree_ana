    region_of_interest: "pipi"
    is_data: false
    is_signal: false
    norm_factor: 0.699 # branch ratio of Z->qq
    input_files:
      - "/eos/home-y/yulei/Ztautau/ntuple/simulation/v94c/91.25/kk2f4146_qqpy/nanoaod_*_ttree.root"

