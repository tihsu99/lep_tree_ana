GlobalConfigs:
  default_output_dir: "./20260413-baseline"
  region_of_interest: &RegionName "baseline"
  load_regions:
    - *RegionName
    - "hadhad"
    - "ee"
    - "mumu"
    - "emu"
  verbosity: 0
  luminosity: &Luminosity 46.3 # pb^-1
  # Ztautau sample can be further split categorizes below
  signal_categories:
    Ztautau_pipi: [11]
    Ztautau_pirho: [12, 21]
    Ztautau_rhorho: [22]
    Ztautau_lephad: [13, 31, 14, 41, 23, 24, 42, 32]
    Ztautau_ee: [33]
    Ztautau_mumu: [44]
    Ztautau_emu: [34]
    Ztautau_mue: [43]

DataLoaders:
  data94:
    name: "data94"
    tree_name: "t"
    is_data: true
    is_signal: false
    input_files:
      - "/eos/home-y/yulei/Ztautau/ntuple/collision_data_v3/v94c/91.25/nanoaod_*.al_ttree.root"
  
  Ztautau:
    name: "Ztautau"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor: 1458.9 # pb
    input_files:
      - "/eos/user/y/yulei/Ztautau/ntuple/simu_20251130/v94c/Z_tautau_v3/simana_*_ttree.root"
      
  Zll:
    name: "Zll"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor:  2844.4 # pb
    input_files:
      - "/eos/user/y/yulei/Ztautau/ntuple/simu_20251130/v94c/Z_ll_v3/simana_*_ttree.root"

  Zqq:
    name: "Zqq"
    tree_name: "t"
    is_data: false
    is_signal: false
    norm_factor: 30511.2 # pb
    input_files:
      # Only load a subset of samples for testing, can load all samples for final analysis
      - "/eos/user/y/yulei/Ztautau/ntuple/simu_20251130/v94c/Z_qq_v3/simana_*01_ttree.root"
      - "/eos/user/y/yulei/Ztautau/ntuple/simu_20251130/v94c/Z_qq_v3/simana_*02_ttree.root"
      - "/eos/user/y/yulei/Ztautau/ntuple/simu_20251130/v94c/Z_qq_v3/simana_*03_ttree.root"

