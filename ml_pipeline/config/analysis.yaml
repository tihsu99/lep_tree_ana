EveNetPrediction:
  # Optional workflow defaults used by util/predict_evenet_from_raw_parquet.py
  # and util/export_evenet_prediction_to_qi.py. Command-line arguments override these.
  converted_parquets: []
  predict_output_dir: null
  mc_parquet: null
  data_parquet: null
  qi_output_dir: null
  qi_method_label: evenet
  mc_split_fraction: null
  regions:
    - baseline
    - hadhad
    - ee
    - mumu
    - emu
    - Ztautau_pipi
    - Ztautau_pirho
    - Ztautau_rhopi
    - Ztautau_pie
    - Ztautau_epi
    - Ztautau_pimu
    - Ztautau_mupi
    - Ztautau_rhoe
    - Ztautau_erho
    - Ztautau_rhomu
    - Ztautau_murho
    - Ztautau_rhorho
    - Ztautau_ee
    - Ztautau_mumu
    - Ztautau_emu
    - Ztautau_mue
    - Ztautau_others

EveNetInput:
  # false keeps the historical point-cloud collection.
  # true keeps charged particles and photons, dropping other neutral particles
  # only from the EveNet sequential input tensor.
  remove_neutral_non_photon: false

Inputs:
  Part:
    Momentum:
      output_dim: 4
      index: [0, 1, 2, 3]
      input: [energy, pt, eta, phi]
    ObjectTag:
      output_dim: 2
      name: ObjectTag
      index: [4, 5]
      input:
        - Part_pdgId
        - hpc:
            output_dim: 2
            name: hpc
            input:
              - Part_hpcShowerEnergy
              - Part_hpcShowerTheta
              - Part_hpcShowerPhi
              - Part_hpcNumLayers
              - Part_hpcNumAssociatedShowers
              - Part_hpcTotalShowerEnergy
        - hac:
            output_dim: 2
            name: hac
            input:
              - Part_hacShowerEnergy
              - Part_hacShowerTheta
              - Part_hacShowerPhi
              - Part_hacNumTowers
              - Part_hacNumAssociatedShowers
              - Part_hacTotalShowerEnergy
        - stic:
            output_dim: 2
            name: stic
            input:
              - Part_sticShowerEnergy
              - Part_sticShowerTheta
              - Part_sticShowerPhi
              - Part_sticNumTowers
              - Part_sticChargedTag
    Charge:
      output_dim: 1
      index: [6]
      input:
        - Part_charge
        - Part_dR_to_lead_a
        - Part_dR_to_lead_b
        - Part_angle_to_lead_a
        - Part_angle_to_lead_b
        - Part_in_hemisphere_a
        - Part_in_hemisphere_b
  Global:
    Fields:
      - thrust_Mag
      - charged_E
      - missing_px
      - missing_py
      - missing_pz
      - lead_a_px
      - lead_a_py
      - lead_a_pz
      - lead_b_px
      - lead_b_py
      - lead_b_pz
      - isolation_angle
      - thrust_x
      - thrust_y
      - thrust_z

Subcategories:
  Ztautau:
